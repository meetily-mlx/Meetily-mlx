name: Cloud Build Meetily App

on:
  push:
    branches:
      - main
  release:
    types: [created]  # Trigger on release creation

jobs:
  build-mac:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tauri.conf.json
        id: get-version
        shell: bash
        run: |
          VERSION=$(grep -o '"version": "[^"]*"' frontend/src-tauri/tauri.conf.json | cut -d'"' -f4)
          echo "Application version from tauri.conf.json: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22' 

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: 'aarch64-apple-darwin'

      - name: Setup macOS SDK and Xcode
        run: |
          sudo xcode-select -s "/Applications/Xcode_26.3.0.app/Contents/Developer"
          SDKROOT=$(xcrun --sdk macosx --show-sdk-path)
          echo "SDKROOT=$SDKROOT" >> $GITHUB_ENV
          echo "MACOSX_DEPLOYMENT_TARGET=11.0" >> $GITHUB_ENV
          XCODE_PATH="/Applications/Xcode_26.3.0.app/Contents/Developer"
          echo "CC=$XCODE_PATH/Toolchains/XcodeDefault.xctoolchain/usr/bin/cc" >> $GITHUB_ENV
          echo "CXX=$XCODE_PATH/Toolchains/XcodeDefault.xctoolchain/usr/bin/c++" >> $GITHUB_ENV
          echo "Xcode: $(xcodebuild -version | head -1)"
          echo "SDKROOT: $SDKROOT"

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: macos-latest-aarch64-apple-darwin-vulkan-v2-xcode-26.3.0

      - name: Install frontend dependencies
        run: |
          cd frontend
          pnpm install

      - name: Configure build acceleration
        run: |
          echo "✓ macOS build will use Metal GPU acceleration (enabled by default)"
          echo "✓ CoreML acceleration available for Apple Silicon"

      - name: Build llama-helper sidecar (macOS)
        shell: bash
        run: |
          echo "Building llama-helper sidecar..."
          cargo build --release -p llama-helper --features metal
          TARGET="aarch64-apple-darwin"
          mkdir -p frontend/src-tauri/binaries
          cp target/release/llama-helper frontend/src-tauri/binaries/llama-helper-${TARGET}
          echo "Copied llama-helper to frontend/src-tauri/binaries/llama-helper-${TARGET}"
          ls -la frontend/src-tauri/binaries/

      - name: Cache FFmpeg binary
        uses: actions/cache@v4
        with:
          path: frontend/src-tauri/binaries/ffmpeg-*
          key: ${{ runner.os }}-ffmpeg-${{ hashFiles('frontend/src-tauri/build.rs', 'frontend/src-tauri/build/ffmpeg.rs') }}    

      - name: Build with Tauri (macOS)
        id: tauri-build-mac
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}  # ← ADD THIS LINE
          MEETILY_RSA_PUBLIC_KEY: ${{ secrets.MEETILY_RSA_PUBLIC_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        with:
          projectPath: frontend
          args: ""

      - name: Upload artifacts to release (macOS)
        uses: softprops/action-gh-release@v1
        with:
          files: |
            target/release/bundle/dmg/*.dmg
            target/release/bundle/macos/*.app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tauri.conf.json
        id: get-version
        shell: bash
        run: |
          VERSION=$(grep -o '"version": "[^"]*"' frontend/src-tauri/tauri.conf.json | cut -d'"' -f4)
          echo "Application version from tauri.conf.json: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22' 

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: 'x86_64-pc-windows-msvc'

      - name: Install Windows build tools
        run: |
          # Install LLVM for Windows
          choco install llvm -y

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: windows-latest-x86_64-pc-windows-msvc-vulkan-v2

      - name: Install frontend dependencies
        run: |
          cd frontend
          pnpm install

      - name: Build llama-helper sidecar (Windows)
        shell: bash
        run: |
          echo "Building llama-helper sidecar for Windows..."
          cargo build --release -p llama-helper
          TARGET="x86_64-pc-windows-msvc"
          mkdir -p frontend/src-tauri/binaries
          cp target/release/llama-helper.exe frontend/src-tauri/binaries/llama-helper-${TARGET}.exe
          echo "Copied llama-helper to frontend/src-tauri/binaries/llama-helper-${TARGET}.exe"
          ls -la frontend/src-tauri/binaries/

      - name: Cache FFmpeg binary
        uses: actions/cache@v4
        with:
          path: frontend/src-tauri/binaries/ffmpeg-*
          key: ${{ runner.os }}-ffmpeg-${{ hashFiles('frontend/src-tauri/build.rs', 'frontend/src-tauri/build/ffmpeg.rs') }}    

      - name: Build with Tauri (Windows)
        id: tauri-build-windows
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}  # ← ADD THIS LINE
          MEETILY_RSA_PUBLIC_KEY: ${{ secrets.MEETILY_RSA_PUBLIC_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        with:
          projectPath: frontend
          args: ""

      - name: Upload artifacts to release (Windows)
        uses: softprops/action-gh-release@v1
        with:
          files: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}